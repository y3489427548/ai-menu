<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 菜品参考图</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:520px;
margin:auto;
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:14px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:18px;
}

button{
margin-top:20px;
background:#ffb300;
color:black;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

img{
width:100%;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI 菜品参考图</h1>

<p>输入菜名生成食材分层图</p>

<input id="dish" placeholder="例如：宫保鸡丁">

<br>

<button onclick="generate()">生成图片</button>

<div id="result"></div>

</div>

<script>

async function generate(){

let dish=document.getElementById("dish").value

document.getElementById("result").innerHTML="生成中..."

let res=await fetch(`/api/generate?dish=${dish}`)

let data=await res.json()

document.getElementById("result").innerHTML=
`<img src="${data.image}">`

}

</script>

</body>
</html>
