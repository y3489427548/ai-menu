<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI 菜品参考图</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.container{
max-width:520px;
margin:auto;
}

input{
width:90%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:20px;
background:#ffb300;
color:black;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

img{
width:100%;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI 菜品参考图</h1>

<p>输入菜名生成食材参考图</p>

<input id="dish" placeholder="例如：宫保鸡丁">

<br>

<button onclick="generate()">生成图片</button>

<div id="result"></div>

</div>

<script>

function generate(){

let dish=document.getElementById("dish").value

let url="https://picsum.photos/800/600?random="+Math.random()

document.getElementById("result").innerHTML="<img src='"+url+"'>"

}

</script>

</body>

</html>
