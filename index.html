<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AI 菜品参考图</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}

input{
width:260px;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
background:#ffb400;
border:none;
border-radius:10px;
cursor:pointer;
}

img{
margin-top:40px;
width:320px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>AI 菜品参考图</h1>

<p>输入菜名生成参考图</p>

<input id="dish" placeholder="输入菜名">

<br>

<button onclick="showImage()">生成图片</button>

<br>

<img id="result" style="display:none">

<script>

function showImage(){

let dish=document.getElementById("dish").value.trim()

if(!dish){
alert("请输入菜名")
return
}

let map={

"宫保鸡丁":"generaltso.jpg",
"General two chicken":"generaltso.jpg",
"锅包肉":"guobaorou.jpg",
"麻婆豆腐":"mapodoufu.jpg",
"鱼香茄子":"yuxiangqiezi.jpg"

}

let img=document.getElementById("result")

if(map[dish]){

img.src="images/"+map[dish]

}else{

img.src="images/generaltso.jpg"

}

img.style.display="block"

}

</script>

</body>

</html>
