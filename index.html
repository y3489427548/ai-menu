<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI 菜品参考图</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
color:#aaa;
margin-bottom:30px;
}

input{
width:320px;
padding:15px;
font-size:18px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

button{
background:#ffb300;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

img{
margin-top:40px;
width:80%;
max-width:700px;
border-radius:12px;
}

</style>
</head>

<body>

<h1>AI 菜品参考图</h1>
<p>输入菜名生成食材参考图</p>

<input id="dish" placeholder="例如：宫保鸡丁">

<br>

<button onclick="showImage()">生成图片</button>

<br>

<img id="result" style="display:none;">

<script>

function showImage(){

let dish=document.getElementById("dish").value.trim()

if(!dish){
alert("请输入菜名")
return
}

let map={

"宫保鸡丁":"General two chicken.jpg",
"锅包肉":"guobaorou.jpg",
"麻婆豆腐":"mapodoufu.jpg",
"鱼香茄子":"yuxiangqiezi.jpg"

}

let img=document.getElementById("result")

if(map[dish]){

img.src="/images/"+map[dish]

}else{

img.src="/images/General two chicken.jpg"

}

img.style.display="block"

}

</script>

</body>
</html>
