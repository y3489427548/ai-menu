<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI 菜品参考图</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

input{
width:90%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:20px;
background:#ffb300;
color:black;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.grid img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI 菜品参考图</h1>

<p>输入菜名生成食材参考图</p>

<input id="dish" placeholder="例如：鱼香肉丝">

<br>

<button onclick="generate()">生成食材</button>

<div class="grid" id="result"></div>

</div>

<script>

function generate(){

let ingredients=[
"garlic",
"chili",
"ginger",
"green onion",
"soy sauce",
"eggplant",
"pork",
"chicken"
]

let html=""

ingredients.forEach(i=>{
html+=`<img src="https://source.unsplash.com/400x400/?${i},food">`
})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
