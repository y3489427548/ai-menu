<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI餐厅海报生成器</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#1c1c1c;
padding:30px;
border-radius:12px;
max-width:520px;
margin:auto;
}

input{
width:85%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:15px;
padding:12px 20px;
background:#ffb300;
border:none;
border-radius:8px;
font-size:16px;
}

#result{
margin-top:25px;
text-align:left;
white-space:pre-line;
background:#000;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🍜 AI餐厅海报 Prompt 生成器</h2>

<p>输入菜名和餐馆名字</p>

<input id="dish" placeholder="菜名：宫保鸡丁">

<br>

<input id="restaurant" placeholder="餐馆：川越居">

<br>

<button onclick="generate()">生成AI海报Prompt</button>

<div id="result"></div>

</div>

<script>

function generate(){

let dish=document.getElementById("dish").value
let restaurant=document.getElementById("restaurant").value

let calories=Math.floor(Math.random()*200+450)

let prompt=

"High-end Chinese food poster\n\n"+
"Restaurant: "+restaurant+"\n\n"+

"Dish: "+dish+"\n\n"+

"Black background commercial food photography\n"+
"45-degree exploded ingredient layout\n"+
"ultra realistic 8k food magazine lighting\n\n"+

"Ingredient Layers:\n"+
"Top: dried chili peppers\n"+
"Second: garlic slices\n"+
"Third: ginger slices\n"+
"Fourth: crispy chicken pieces\n"+
"Fifth: sweet soy chili sauce\n\n"+

"Bottom: finished dish "+dish+" in ceramic bowl with steam\n\n"+

"Nutrition:\n"+
calories+" kcal\n\n"+

"Allergy:\nsoy · gluten · egg\n\n"+

"Chinese English labels\n"+
"restaurant branding design\n"+
"luxury Chinese restaurant poster"

document.getElementById("result").innerText=prompt

}

</script>

</body>
</html>
